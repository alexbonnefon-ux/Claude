name: Daily Job Scraper

on:
  schedule:
    # 7:00 UTC = 8:00 Paris (CET) / 9:00 Paris (CEST)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug logging"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  scrape:
    name: Scrape & Email Job Digest
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          FRANCE_TRAVAIL_CLIENT_ID=${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET=${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}
          DB_PATH=jobs.db
          EOF

      - name: Restore SQLite database from cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_number }}
          restore-keys: |
            jobs-db-

      - name: Run job scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          DB_PATH: jobs.db
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          python -m src.main

      - name: Upload scraper log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_number }}
          path: scraper.log
          retention-days: 14

      - name: Upload database as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db-failure-${{ github.run_number }}
          path: jobs.db
          retention-days: 7

      - name: Notify on failure via email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "⚠️ Job Scraper Failed – ${{ github.run_number }}"
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: ${{ secrets.GMAIL_USER }}
          body: |
            The daily job scraper failed on run #${{ github.run_number }}.

            View the workflow run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Check the scraper-log artifact for details.
