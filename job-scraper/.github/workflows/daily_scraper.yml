name: Daily Job Scraper

on:
  schedule:
    # 7:00 UTC = 8:00 Paris (CET) / 9:00 Paris (CEST)
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & Score Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Restore SQLite database from cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_number }}
          restore-keys: |
            jobs-db-

      - name: Run job scraper pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          DB_PATH: jobs.db
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          python -m src.main

      - name: Upload SQLite database as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db-${{ github.run_number }}
          path: jobs.db
          retention-days: 30

      - name: Upload scraper log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_number }}
          path: scraper.log
          retention-days: 14
