<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Job Radar — Alexis Bonnefon</title>
  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --bg-card:     #161b22;
      --bg-card-2:   #1c2128;
      --border:      #30363d;
      --border-light:#21262d;
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --text-dim:    #484f58;

      --green:       #3fb950;
      --green-bg:    rgba(63,185,80,.12);
      --yellow:      #d29922;
      --yellow-bg:   rgba(210,153,34,.12);
      --orange:      #e3702a;
      --orange-bg:   rgba(227,112,42,.12);
      --red:         #f85149;
      --blue:        #58a6ff;
      --purple:      #bc8cff;

      --radius:      10px;
      --radius-sm:   6px;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
      --transition:  .2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ============================================================
       SCROLLBAR
       ============================================================ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      background: linear-gradient(135deg, #161b22 0%, #1c2340 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo .emoji { margin-right: 8px; }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ============================================================
       STATS BAR
       ============================================================ */
    .stats-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-light);
      padding: 14px 24px;
    }

    .stats-bar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .stat-value {
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
      line-height: 1;
    }

    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; }

    .stat.green .stat-value { color: var(--green); }
    .stat.yellow .stat-value { color: var(--yellow); }
    .stat.orange .stat-value { color: var(--orange); }

    .stat-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .last-updated {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }
    .btn-primary:hover { background: #79b8ff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(88,166,255,.3); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-card-2); color: var(--text); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(248,81,73,.3);
    }
    .btn-danger:hover { background: rgba(248,81,73,.1); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .spinning .spinner { display: block; }
    .spinning .btn-icon { display: none; }

    /* ============================================================
       PROGRESS BAR
       ============================================================ */
    .progress-wrap {
      max-width: 1200px;
      margin: 16px auto 0;
      padding: 0 24px;
      display: none;
    }
    .progress-wrap.visible { display: block; }

    .progress-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .progress-bar-track {
      flex: 1;
      height: 6px;
      background: var(--bg-card-2);
      border-radius: 3px;
      overflow: hidden;
    }

    @keyframes progress-anim {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    .progress-bar-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      border-radius: 3px;
      animation: progress-anim 1.4s ease-in-out infinite;
    }

    .progress-text {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ============================================================
       MAIN LAYOUT
       ============================================================ */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ============================================================
       FILTER BAR
       ============================================================ */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-dim);
      margin-right: 4px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    .filter-search {
      margin-left: auto;
      position: relative;
    }

    .filter-search input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px 7px 34px;
      color: var(--text);
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: var(--transition);
    }
    .filter-search input:focus { border-color: var(--blue); width: 280px; }
    .filter-search::before {
      content: "🔍";
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      pointer-events: none;
    }

    /* ============================================================
       SECTION
       ============================================================ */
    .section { margin-bottom: 40px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .section-header.green  { border-color: var(--green); }
    .section-header.yellow { border-color: var(--yellow); }
    .section-header.orange { border-color: var(--orange); }

    .section-title {
      font-size: 18px;
      font-weight: 700;
    }

    .section-count {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .section-count.green  { background: var(--green-bg);  color: var(--green); }
    .section-count.yellow { background: var(--yellow-bg); color: var(--yellow); }
    .section-count.orange { background: var(--orange-bg); color: var(--orange); }

    /* ============================================================
       JOBS GRID
       ============================================================ */
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ============================================================
       JOB CARD
       ============================================================ */
    .job-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .job-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .job-card.green::before  { background: linear-gradient(90deg, var(--green), #2ea043); }
    .job-card.yellow::before { background: linear-gradient(90deg, var(--yellow), #b08800); }
    .job-card.orange::before { background: linear-gradient(90deg, var(--orange), #c4571e); }

    .job-card:hover {
      border-color: var(--border);
      background: var(--bg-card-2);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    /* Card header row */
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .score-badge {
      flex-shrink: 0;
      width: 48px; height: 48px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      font-weight: 800;
      font-size: 18px;
      line-height: 1;
      position: relative;
      cursor: help;
    }

    .score-badge.green  { background: var(--green-bg);  color: var(--green); }
    .score-badge.yellow { background: var(--yellow-bg); color: var(--yellow); }
    .score-badge.orange { background: var(--orange-bg); color: var(--orange); }
    .score-badge.gray   { background: var(--bg-card-2); color: var(--text-dim); }

    .score-badge .score-label {
      font-size: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .4px;
      opacity: .7;
      margin-top: 2px;
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2530;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      width: 220px;
      font-size: 11px;
      color: var(--text);
      z-index: 200;
      box-shadow: var(--shadow);
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
    }
    .tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--border);
    }

    .score-badge:hover .tooltip { opacity: 1; }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .tooltip-row:last-child { margin: 0; }
    .tooltip-key { color: var(--text-muted); }
    .tooltip-val { font-weight: 600; }

    .tooltip-explain {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Card info */
    .card-info { flex: 1; min-width: 0; }

    .job-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .company-name {
      font-size: 13px;
      color: var(--blue);
      font-weight: 500;
    }

    /* Badges row */
    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .badge-location {
      background: rgba(88,166,255,.1);
      color: var(--blue);
      border-color: rgba(88,166,255,.2);
    }

    .badge-remote-full {
      background: var(--green-bg);
      color: var(--green);
      border-color: rgba(63,185,80,.2);
    }

    .badge-remote-hybrid {
      background: var(--yellow-bg);
      color: var(--yellow);
      border-color: rgba(210,153,34,.2);
    }

    .badge-onsite {
      background: rgba(125,133,144,.1);
      color: var(--text-muted);
      border-color: rgba(125,133,144,.2);
    }

    .badge-salary {
      background: rgba(188,140,255,.1);
      color: var(--purple);
      border-color: rgba(188,140,255,.2);
    }

    /* Card footer */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      gap: 8px;
    }

    .posted-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    .posted-date.fresh { color: var(--green); }
    .posted-date.recent { color: var(--yellow); }

    .apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
    }
    .apply-btn:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      text-decoration: none;
    }

    /* ============================================================
       EMPTY STATE
       ============================================================ */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-state .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h2 {
      font-size: 20px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      max-width: 360px;
      margin: 0 auto 24px;
    }

    /* ============================================================
       TOAST NOTIFICATION
       ============================================================ */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }

    @keyframes toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @keyframes toast-out { to { opacity: 0; transform: translateY(12px); } }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card-2);
      box-shadow: var(--shadow);
      font-size: 13px;
      animation: toast-in .25s ease forwards;
      max-width: 340px;
    }
    .toast.success { border-color: rgba(63,185,80,.4); }
    .toast.error   { border-color: rgba(248,81,73,.4); }
    .toast.info    { border-color: rgba(88,166,255,.4); }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 640px) {
      .header-inner { gap: 10px; }
      .stats-bar-inner { gap: 16px; }
      .stat-divider { display: none; }
      .filter-search { width: 100%; }
      .filter-search input { width: 100%; }
      .filter-search input:focus { width: 100%; }
      .jobs-grid { grid-template-columns: 1fr; }
      .last-updated { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="header">
  <div class="header-inner">
    <div>
      <div class="logo"><span class="emoji">🎯</span>HR Job Radar</div>
      <div class="subtitle">Alexis Bonnefon · Tours, France</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="clearBtn" title="Clear old jobs (older than 7 days)">
        🗑 Clear old
      </button>
      <button class="btn btn-primary" id="refreshBtn" onclick="triggerScrape()">
        <span class="btn-icon">🔄</span>
        <span class="spinner"></span>
        <span class="btn-text">Refresh Jobs</span>
      </button>
    </div>
  </div>
</header>

<!-- ============================================================
     STATS BAR
     ============================================================ -->
<div class="stats-bar">
  <div class="stats-bar-inner">
    <div class="stat">
      <div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Total jobs</div>
      </div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat green">
      <div>
        <div class="stat-value" id="statTop">—</div>
        <div class="stat-label">Top Picks</div>
      </div>
    </div>
    <div class="stat yellow">
      <div>
        <div class="stat-value" id="statGood">—</div>
        <div class="stat-label">Good Matches</div>
      </div>
    </div>
    <div class="stat orange">
      <div>
        <div class="stat-value" id="statWorth">—</div>
        <div class="stat-label">Worth Checking</div>
      </div>
    </div>
    <div class="stat-divider"></div>
    <div class="last-updated" id="lastUpdated">Last update: never</div>
  </div>
</div>

<!-- ============================================================
     PROGRESS INDICATOR
     ============================================================ -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-card">
    <div class="progress-bar-track">
      <div class="progress-bar-fill"></div>
    </div>
    <div class="progress-text" id="progressText">Scraping in progress…</div>
  </div>
</div>

<!-- ============================================================
     MAIN
     ============================================================ -->
<main class="main">

  <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-label">Show:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="top" onclick="setFilter('top', this)">🏆 Top Picks</button>
    <button class="filter-btn" data-filter="good" onclick="setFilter('good', this)">✅ Good Matches</button>
    <button class="filter-btn" data-filter="worth" onclick="setFilter('worth', this)">👀 Worth Checking</button>
    <button class="filter-btn" data-filter="remote" onclick="setFilter('remote', this)">🌍 Remote only</button>
    <div class="filter-search">
      <input type="text" id="searchInput" placeholder="Search jobs…" oninput="renderJobs()" />
    </div>
  </div>

  <!-- Sections (rendered by JS) -->
  <div id="app"></div>

</main>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
let allJobs = [];
let currentFilter = 'all';
let pollInterval = null;
let currentScrapeJobId = null;

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  loadJobs();
  loadStats();
  setupClearBtn();
});

/* ============================================================
   API CALLS
   ============================================================ */
async function loadJobs() {
  try {
    const res = await fetch('/api/jobs?min_score=0&limit=500');
    const data = await res.json();
    allJobs = data.jobs || [];
    renderJobs();
  } catch (e) {
    console.error('Failed to load jobs:', e);
    showToast('Failed to load jobs: ' + e.message, 'error');
  }
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('statTotal').textContent = data.total ?? '0';
    document.getElementById('statTop').textContent = data.top_picks ?? '0';
    document.getElementById('statGood').textContent = data.good_matches ?? '0';
    document.getElementById('statWorth').textContent = data.worth_checking ?? '0';

    if (data.last_scraped) {
      const dt = new Date(data.last_scraped + (data.last_scraped.endsWith('Z') ? '' : 'Z'));
      document.getElementById('lastUpdated').textContent = 'Last update: ' + formatRelativeDate(dt) + ' (' + dt.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) + ')';
    }
  } catch (e) {
    console.error('Failed to load stats:', e);
  }
}

async function triggerScrape() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('spinning');
  btn.querySelector('.btn-text').textContent = 'Scraping…';

  try {
    const res = await fetch('/api/scrape', { method: 'POST' });
    const data = await res.json();

    if (data.status === 'already_running') {
      showToast('A scrape is already in progress', 'info');
      currentScrapeJobId = data.job_id;
    } else {
      currentScrapeJobId = data.job_id;
      showToast('Scrape started! This may take a few minutes…', 'info');
    }

    showProgress('Launching all scrapers…');
    startPolling(data.job_id);
  } catch (e) {
    showToast('Failed to trigger scrape: ' + e.message, 'error');
    resetRefreshBtn();
  }
}

async function pollScrapeStatus(jobId) {
  try {
    const res = await fetch('/api/scrape/status/' + jobId);
    const data = await res.json();

    if (data.status === 'running') {
      updateProgress('Scraping and scoring jobs…');
    } else if (data.status === 'done') {
      stopPolling();
      hideProgress();
      resetRefreshBtn();
      showToast(`Done! Found ${data.jobs_found} jobs, scored ${data.jobs_scored}.`, 'success');
      await loadJobs();
      await loadStats();
    } else if (data.status === 'error') {
      stopPolling();
      hideProgress();
      resetRefreshBtn();
      showToast('Scrape failed: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch (e) {
    console.error('Poll error:', e);
  }
}

async function clearOldJobs() {
  try {
    const res = await fetch('/api/jobs/clear?older_than_days=7', { method: 'DELETE' });
    const data = await res.json();
    showToast(`Cleared ${data.deleted} old jobs.`, 'success');
    await loadJobs();
    await loadStats();
  } catch (e) {
    showToast('Failed to clear: ' + e.message, 'error');
  }
}

/* ============================================================
   POLLING
   ============================================================ */
function startPolling(jobId) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(() => pollScrapeStatus(jobId), 3000);
}

function stopPolling() {
  if (pollInterval) {
    clearInterval(pollInterval);
    pollInterval = null;
  }
}

/* ============================================================
   PROGRESS
   ============================================================ */
function showProgress(msg) {
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('progressText').textContent = msg;
}

function updateProgress(msg) {
  document.getElementById('progressText').textContent = msg;
}

function hideProgress() {
  document.getElementById('progressWrap').classList.remove('visible');
}

/* ============================================================
   FILTERS
   ============================================================ */
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderJobs();
}

function getFilteredJobs() {
  let jobs = allJobs;
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();

  if (currentFilter === 'top')    jobs = jobs.filter(j => (j.score || 0) >= 8);
  if (currentFilter === 'good')   jobs = jobs.filter(j => (j.score || 0) >= 6 && (j.score || 0) < 8);
  if (currentFilter === 'worth')  jobs = jobs.filter(j => (j.score || 0) >= 4 && (j.score || 0) < 6);
  if (currentFilter === 'remote') jobs = jobs.filter(j => j.remote_policy === 'full');

  if (query) {
    jobs = jobs.filter(j =>
      (j.title || '').toLowerCase().includes(query) ||
      (j.company || '').toLowerCase().includes(query) ||
      (j.location || '').toLowerCase().includes(query)
    );
  }

  return jobs;
}

/* ============================================================
   RENDER
   ============================================================ */
function renderJobs() {
  const app = document.getElementById('app');
  const jobs = getFilteredJobs();

  if (jobs.length === 0 && allJobs.length === 0) {
    app.innerHTML = emptyState();
    return;
  }

  if (jobs.length === 0) {
    app.innerHTML = `<div class="empty-state">
      <span class="empty-icon">🔍</span>
      <h2>No jobs match your filter</h2>
      <p>Try changing the filter or search query.</p>
    </div>`;
    return;
  }

  const topPicks     = jobs.filter(j => (j.score || 0) >= 8);
  const goodMatches  = jobs.filter(j => (j.score || 0) >= 6 && (j.score || 0) < 8);
  const worthChecking = jobs.filter(j => (j.score || 0) >= 4 && (j.score || 0) < 6);
  const unscored      = jobs.filter(j => j.score == null || j.score < 4);

  let html = '';

  if (currentFilter === 'all' || currentFilter === 'top' || currentFilter === 'remote') {
    if (topPicks.length) html += renderSection('🏆 Top Picks', topPicks, 'green', '8–10');
  }
  if (currentFilter === 'all' || currentFilter === 'good' || currentFilter === 'remote') {
    if (goodMatches.length) html += renderSection('✅ Good Matches', goodMatches, 'yellow', '6–7');
  }
  if (currentFilter === 'all' || currentFilter === 'worth' || currentFilter === 'remote') {
    if (worthChecking.length) html += renderSection('👀 Worth Checking', worthChecking, 'orange', '4–5');
  }
  if (currentFilter === 'all' && unscored.length) {
    html += renderSection('⏳ Not Yet Scored', unscored, 'gray', '—');
  }

  app.innerHTML = html || `<div class="empty-state">
    <span class="empty-icon">🎯</span>
    <h2>No results</h2>
    <p>Try a different filter.</p>
  </div>`;
}

function renderSection(title, jobs, colorClass, scoreRange) {
  return `
    <div class="section">
      <div class="section-header ${colorClass}">
        <h2 class="section-title">${title}</h2>
        <span class="section-count ${colorClass}">${jobs.length} job${jobs.length !== 1 ? 's' : ''}</span>
        <span style="color:var(--text-dim);font-size:12px;">score ${scoreRange}</span>
      </div>
      <div class="jobs-grid">
        ${jobs.map(j => renderCard(j, colorClass)).join('')}
      </div>
    </div>
  `;
}

function renderCard(job, colorClass) {
  const score = job.score != null ? job.score.toFixed(1) : '?';
  const details = (typeof job.score_details === 'string') ? safeParseJson(job.score_details) : (job.score_details || {});

  const scoreClass = job.score == null ? 'gray' : colorClass;
  const tooltip = buildTooltip(details);

  const remoteBadge = remoteToHtml(job.remote_policy);
  const salaryBadge = salaryToHtml(job);
  const dateStr = dateToHtml(job.posted_date);
  const locationStr = (job.location || '').slice(0, 50);

  return `
    <div class="job-card ${colorClass}">
      <div class="card-header">
        <div class="score-badge ${scoreClass}">
          ${score}
          <span class="score-label">score</span>
          ${tooltip}
        </div>
        <div class="card-info">
          <div class="job-title">${escHtml(job.title || 'Untitled')}</div>
          <div class="company-name">${escHtml(job.company || '—')}</div>
        </div>
      </div>

      <div class="badges">
        ${locationStr ? `<span class="badge badge-location">📍 ${escHtml(locationStr)}</span>` : ''}
        ${remoteBadge}
        ${salaryBadge}
      </div>

      <div class="card-footer">
        <div class="posted-date ${dateClass(job.posted_date)}">${dateStr}</div>
        <a class="apply-btn" href="${escHtml(job.url || '#')}" target="_blank" rel="noopener">
          Apply →
        </a>
      </div>
    </div>
  `;
}

function buildTooltip(details) {
  if (!details || !details.score) return '';
  const rows = [
    { k: 'Role match', v: details.role_match != null ? `${details.role_match}/3` : '—' },
    { k: 'Location', v: details.location_match != null ? `${details.location_match}/2` : '—' },
    { k: 'Salary', v: details.salary_match != null ? `${details.salary_match}/2` : '—' },
    { k: 'Company', v: details.company_match != null ? `${details.company_match}/2` : '—' },
    { k: 'Freshness', v: details.freshness != null ? `${details.freshness}/1` : '—' },
  ];
  const rowsHtml = rows.map(r => `
    <div class="tooltip-row">
      <span class="tooltip-key">${r.k}</span>
      <span class="tooltip-val">${r.v}</span>
    </div>
  `).join('');

  const explainHtml = details.explanation
    ? `<div class="tooltip-explain">${escHtml(details.explanation.slice(0, 180))}</div>`
    : '';

  return `<div class="tooltip">${rowsHtml}${explainHtml}</div>`;
}

function remoteToHtml(policy) {
  if (policy === 'full')   return '<span class="badge badge-remote-full">🌍 Full remote</span>';
  if (policy === 'hybrid') return '<span class="badge badge-remote-hybrid">🏡 Hybrid</span>';
  if (policy === 'onsite') return '<span class="badge badge-onsite">🏢 On-site</span>';
  return '';
}

function salaryToHtml(job) {
  if (!job.salary_min && !job.salary_max) return '';
  let s = '';
  if (job.salary_min && job.salary_max) s = `${fmtK(job.salary_min)}–${fmtK(job.salary_max)}k€`;
  else if (job.salary_min) s = `≥${fmtK(job.salary_min)}k€`;
  else s = `≤${fmtK(job.salary_max)}k€`;
  if (job.salary_estimated) s += ' ~';
  return `<span class="badge badge-salary">💰 ${s}</span>`;
}

function fmtK(n) {
  if (!n) return '?';
  return n >= 1000 ? (n / 1000).toFixed(0) : n;
}

function dateToHtml(dateStr) {
  if (!dateStr) return 'Date inconnue';
  try {
    const dt = new Date(dateStr.endsWith('Z') ? dateStr : dateStr + 'Z');
    return formatRelativeDate(dt);
  } catch { return 'Date inconnue'; }
}

function dateClass(dateStr) {
  if (!dateStr) return '';
  try {
    const dt = new Date(dateStr.endsWith('Z') ? dateStr : dateStr + 'Z');
    const diffDays = (Date.now() - dt.getTime()) / (1000 * 60 * 60 * 24);
    if (diffDays < 1)  return 'fresh';
    if (diffDays < 3)  return 'recent';
    return '';
  } catch { return ''; }
}

function formatRelativeDate(dt) {
  const now = Date.now();
  const diff = now - dt.getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);

  if (mins < 2)   return 'just now';
  if (mins < 60)  return `${mins} min ago`;
  if (hours < 24) return `today`;
  if (days === 1) return 'yesterday';
  if (days < 7)   return `${days} days ago`;
  return dt.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

function emptyState() {
  return `
    <div class="empty-state">
      <span class="empty-icon">🎯</span>
      <h2>No jobs yet</h2>
      <p>Click <strong>Refresh Jobs</strong> to run all scrapers and find HR opportunities tailored for you.</p>
      <button class="btn btn-primary" onclick="triggerScrape()">
        🔄 Run scrapers now
      </button>
    </div>
  `;
}

/* ============================================================
   UTILITIES
   ============================================================ */
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function safeParseJson(s) {
  try { return JSON.parse(s); } catch { return {}; }
}

function resetRefreshBtn() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = false;
  btn.classList.remove('spinning');
  btn.querySelector('.btn-text').textContent = 'Refresh Jobs';
}

function setupClearBtn() {
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (confirm('Clear all jobs scraped more than 7 days ago?')) {
      clearOldJobs();
    }
  });
}

/* ============================================================
   TOASTS
   ============================================================ */
function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type] || ''}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toast-out .25s ease forwards';
    setTimeout(() => toast.remove(), 260);
  }, 4500);
}
</script>
